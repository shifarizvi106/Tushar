<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tushar </title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-primary: #ff69b4;
            --color-secondary: #ff1493;
            --color-tertiary: #ff8cba;
            --color-quaternary: #ffb6c1;
            --color-quinary: #ff69b4;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            display: flex;
            align-content: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .text-shadows {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(2rem, 8vw, 6rem);
            text-align: center;
            margin: 0;
            color: #ff69b4;
            letter-spacing: 0.2rem;
            text-shadow: 
                3px 3px 0 #ff1493,
                6px 6px 0 #ff8cba,
                9px 9px 0 #ffb6c1,
                12px 12px 0 #ff69b4;
            animation: shadows 1.2s ease-in infinite;
            filter: drop-shadow(0 0 30px rgba(255, 105, 180, 0.4));
            line-height: 1.2;
            padding: 20px;
        }

        @keyframes shadows {
            0% {
                text-shadow: none;
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-3px, -3px);
                text-shadow: 3px 3px 0 var(--color-secondary);
            }
            20% {
                transform: translate(-6px, -6px);
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary);
            }
            30% {
                transform: translate(-9px, -9px);
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary),
                    9px 9px 0 var(--color-quaternary);
            }
            40% {
                transform: translate(-12px, -12px);
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary),
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            50% {
                transform: translate(-12px, -12px);
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary),
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            60% {
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary),
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            70% {
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary),
                    9px 9px 0 var(--color-quaternary);
            }
            80% {
                text-shadow: 
                    3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary);
            }
            90% {
                text-shadow: 3px 3px 0 var(--color-secondary);
            }
            100% {
                text-shadow: none;
                transform: translate(0, 0);
            }
        }

        .subtitle {
            color: rgba(255, 105, 180, 0.5);
            font-family: 'Courier New', monospace;
            font-size: clamp(0.8rem, 1.5vw, 1.2rem);
            position: relative;
            z-index: 1;
            margin-top: 10px;
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* Make text glow more */
        .glow {
            position: relative;
            z-index: 1;
        }

        .glow::after {
            content: 'I love you Tushar';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            text-shadow: 0 0 40px rgba(255, 105, 180, 0.5), 0 0 80px rgba(255, 20, 147, 0.3);
            z-index: -1;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(2rem, 8vw, 6rem);
            text-align: center;
            letter-spacing: 0.2rem;
            line-height: 1.2;
            padding: 20px;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="content">
        <h1 class="text-shadows glow">I love you Tushar</h1>
    </div>
   

    <script>
        // ============================================================
        //  MATRIX RAIN (Pink)
        // ============================================================
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let drops = [];
        const characters = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let fontSize = 14;
        let speed = 1;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cols = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let i = 0; i < cols; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const char = characters[Math.floor(Math.random() * characters.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Pink gradient for matrix rain
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, fontSize);
                const pink = Math.random();
                if (pink > 0.7) {
                    gradient.addColorStop(0, '#ff1493');
                    gradient.addColorStop(1, '#ff69b4');
                } else if (pink > 0.4) {
                    gradient.addColorStop(0, '#ff69b4');
                    gradient.addColorStop(1, '#ff8cba');
                } else {
                    gradient.addColorStop(0, '#ff8cba');
                    gradient.addColorStop(1, '#ffb6c1');
                }

                ctx.fillStyle = gradient;
                ctx.font = `${fontSize}px 'Courier New', monospace`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += speed + Math.random() * 0.5;
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        console.log(' I love you Tushar ');
    </script>
</body>
</html>
