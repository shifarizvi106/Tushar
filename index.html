<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Tushar </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'IBM Plex Mono', monospace;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #container canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        #container pre {
            margin: 0;
            user-select: none;
            padding: 0;
            line-height: 1em;
            text-align: left;
            position: absolute;
            left: 0;
            top: 0;
            background-image: radial-gradient(circle, #ff6188 0%, #fc9867 50%, #ffd866 100%);
            background-attachment: fixed;
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            z-index: 9;
            mix-blend-mode: difference;
            pointer-events: none;
        }
        /* Matrix rain canvas stays behind */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        /* ASCII filter container - now with better visibility */
        .ascii-filter-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .ascii-filter-container canvas {
            display: none !important;
        }
        .ascii-filter-container pre {
            margin: 0;
            user-select: none;
            padding: 0;
            line-height: 1em;
            text-align: left;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 9;
            pointer-events: none;
            /* Brighter, more readable text */
            color: #ff69b4;
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 20px #ff1493,
                0 0 40px #ff1493,
                0 0 80px #ff1493;
            font-weight: bold;
            opacity: 1;
            background: transparent;
            -webkit-text-fill-color: #ff69b4;
            -webkit-background-clip: unset;
            background-image: none;
            mix-blend-mode: normal;
        }
        /* Make ASCII text brighter */
        .ascii-filter-container pre .highlight {
            color: #ff8cba;
            text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

    <script>
        // ============================================================
        //  MATRIX RAIN (Pink)
        // ============================================================
        class MatrixRain {
            constructor(container) {
                this.container = container;
                this.canvas = document.createElement('canvas');
                this.canvas.id = 'matrixCanvas';
                this.container.appendChild(this.canvas);

                this.ctx = this.canvas.getContext('2d');
                this.drops = [];
                this.characters =
                    'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                this.fontSize = 14;
                this.speed = 1;

                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }

            resize() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                const cols = Math.floor(this.canvas.width / this.fontSize);
                this.drops = [];
                for (let i = 0; i < cols; i++) {
                    this.drops[i] = Math.random() * -100;
                }
            }

            animate() {
                // Darker background for better contrast
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                for (let i = 0; i < this.drops.length; i++) {
                    const char = this.characters[Math.floor(Math.random() * this.characters.length)];
                    const x = i * this.fontSize;
                    const y = this.drops[i] * this.fontSize;

                    // Brighter pink colors for better visibility
                    const gradient = this.ctx.createRadialGradient(x, y, 0, x, y, this.fontSize);
                    const pink = Math.random();
                    if (pink > 0.8) {
                        gradient.addColorStop(0, '#ff1493');
                        gradient.addColorStop(1, '#ff69b4');
                    } else if (pink > 0.5) {
                        gradient.addColorStop(0, '#ff69b4');
                        gradient.addColorStop(1, '#ff8cba');
                    } else {
                        gradient.addColorStop(0, '#ff8cba');
                        gradient.addColorStop(1, '#ffb6c1');
                    }

                    this.ctx.fillStyle = gradient;
                    this.ctx.font = `${this.fontSize}px 'IBM Plex Mono', monospace`;
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                    this.ctx.fillText(char, x, y);

                    if (y > this.canvas.height && Math.random() > 0.975) {
                        this.drops[i] = 0;
                    }
                    this.drops[i] += this.speed + Math.random() * 0.5;
                }

                requestAnimationFrame(() => this.animate());
            }

            dispose() {
                if (this.canvas.parentNode) {
                    this.container.removeChild(this.canvas);
                }
            }
        }

        // ============================================================
        //  MATH HELPERS
        // ============================================================
        Math.map = function(n, start, stop, start2, stop2) {
            return ((n - start) / (stop - start)) * (stop2 - start2) + start2;
        };

        // ============================================================
        //  VERTEX SHADER
        // ============================================================
        const vertexShader = `
            varying vec2 vUv;
            uniform float uTime;
            uniform float mouse;
            uniform float uEnableWaves;

            void main() {
                vUv = uv;
                float time = uTime * 5.;
                float waveFactor = uEnableWaves;
                vec3 transformed = position;
                transformed.x += sin(time + position.y) * 0.5 * waveFactor;
                transformed.y += cos(time + position.z) * 0.15 * waveFactor;
                transformed.z += sin(time + position.x) * waveFactor;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
            }
        `;

        // ============================================================
        //  FRAGMENT SHADER - Made brighter
        // ============================================================
        const fragmentShader = `
            varying vec2 vUv;
            uniform float mouse;
            uniform float uTime;
            uniform sampler2D uTexture;

            void main() {
                float time = uTime;
                vec2 pos = vUv;
                float r = texture2D(uTexture, pos + cos(time * 2. - time + pos.x) * .01).r;
                float g = texture2D(uTexture, pos + tan(time * .5 + pos.x - time) * .01).g;
                float b = texture2D(uTexture, pos - cos(time * 2. + time + pos.y) * .01).b;
                float a = texture2D(uTexture, pos).a;
                // Boost brightness and contrast
                vec4 color = vec4(r, g, b, a);
                color.rgb = color.rgb * 1.5;
                color.r = min(color.r, 1.0);
                color.g = min(color.g, 1.0);
                color.b = min(color.b, 1.0);
                gl_FragColor = color;
            }
        `;

        // ============================================================
        //  ASCII FILTER - Improved for readability
        // ============================================================
        const PX_RATIO = window.devicePixelRatio || 1;

        class AsciiFilter {
            constructor(renderer, { fontSize, fontFamily, charset, invert } = {}) {
                this.renderer = renderer;
                this.domElement = document.createElement('div');
                this.domElement.className = 'ascii-filter-container';
                this.domElement.style.position = 'absolute';
                this.domElement.style.top = '0';
                this.domElement.style.left = '0';
                this.domElement.style.width = '100%';
                this.domElement.style.height = '100%';
                this.domElement.style.zIndex = '2';
                this.domElement.style.pointerEvents = 'none';

                this.pre = document.createElement('pre');
                this.pre.style.color = '#ff69b4';
                this.pre.style.textShadow = '0 0 10px #ff69b4, 0 0 20px #ff1493, 0 0 40px #ff1493';
                this.pre.style.fontWeight = 'bold';
                this.pre.style.background = 'transparent';
                this.pre.style.mixBlendMode = 'normal';
                this.domElement.appendChild(this.pre);

                this.canvas = document.createElement('canvas');
                this.context = this.canvas.getContext('2d');
                this.domElement.appendChild(this.canvas);

                this.deg = 0;
                this.invert = invert ?? false; // Changed to false for better readability
                this.fontSize = fontSize ?? 14;
                this.fontFamily = fontFamily ?? "'Courier New', monospace";
                // More readable charset with more density
                this.charset = '@%#*+=-:. ';

                this.context.webkitImageSmoothingEnabled = false;
                this.context.mozImageSmoothingEnabled = false;
                this.context.msImageSmoothingEnabled = false;
                this.context.imageSmoothingEnabled = false;

                this.onMouseMove = this.onMouseMove.bind(this);
                document.addEventListener('mousemove', this.onMouseMove);
            }

            setSize(width, height) {
                this.width = width;
                this.height = height;
                this.renderer.setSize(width, height);
                this.reset();
                this.center = { x: width / 2, y: height / 2 };
                this.mouse = { x: this.center.x, y: this.center.y };
            }

            reset() {
                this.context.font = `${this.fontSize}px ${this.fontFamily}`;
                const charWidth = this.context.measureText('A').width;
                this.cols = Math.floor(this.width / (this.fontSize * (charWidth / this.fontSize)));
                this.rows = Math.floor(this.height / this.fontSize);
                this.canvas.width = this.cols;
                this.canvas.height = this.rows;
                this.pre.style.fontFamily = this.fontFamily;
                this.pre.style.fontSize = `${this.fontSize}px`;
                this.pre.style.margin = '0';
                this.pre.style.padding = '0';
                this.pre.style.lineHeight = '1em';
                this.pre.style.position = 'absolute';
                this.pre.style.left = '0';
                this.pre.style.top = '0';
                this.pre.style.zIndex = '9';
                this.pre.style.pointerEvents = 'none';
                this.pre.style.color = '#ff69b4';
                this.pre.style.textShadow = '0 0 10px #ff69b4, 0 0 20px #ff1493, 0 0 40px #ff1493, 0 0 80px #ff1493';
                this.pre.style.fontWeight = 'bold';
                this.pre.style.background = 'transparent';
                this.pre.style.mixBlendMode = 'normal';
                this.pre.style.webkitTextFillColor = '#ff69b4';
                this.pre.style.backgroundImage = 'none';
                this.pre.style.webkitBackgroundClip = 'unset';
            }

            render(scene, camera) {
                this.renderer.render(scene, camera);
                const w = this.canvas.width;
                const h = this.canvas.height;
                this.context.clearRect(0, 0, w, h);
                if (this.context && w && h) {
                    this.context.drawImage(this.renderer.domElement, 0, 0, w, h);
                }
                this.asciify(this.context, w, h);
                this.hue();
            }

            onMouseMove(e) {
                this.mouse = { x: e.clientX * PX_RATIO, y: e.clientY * PX_RATIO };
            }

            get dx() {
                return this.mouse.x - this.center.x;
            }
            get dy() {
                return this.mouse.y - this.center.y;
            }

            hue() {
                const deg = (Math.atan2(this.dy, this.dx) * 180) / Math.PI;
                this.deg += (deg - this.deg) * 0.075;
                this.domElement.style.filter = `hue-rotate(${this.deg.toFixed(1)}deg)`;
            }

            asciify(ctx, w, h) {
                if (w && h) {
                    const imgData = ctx.getImageData(0, 0, w, h).data;
                    let str = '';
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const i = x * 4 + y * 4 * w;
                            const [r, g, b, a] = [imgData[i], imgData[i + 1], imgData[i + 2], imgData[i + 3]];
                            if (a === 0) {
                                str += ' ';
                                continue;
                            }
                            let gray = (0.3 * r + 0.6 * g + 0.1 * b) / 255;
                            // Boost contrast
                            gray = Math.pow(gray, 0.8);
                            let idx = Math.floor((1 - gray) * (this.charset.length - 1));
                            if (this.invert) idx = this.charset.length - idx - 1;
                            str += this.charset[idx];
                        }
                        str += '\n';
                    }
                    this.pre.innerHTML = str;
                }
            }

            dispose() {
                document.removeEventListener('mousemove', this.onMouseMove);
            }
        }

        // ============================================================
        //  CANVAS TEXT
        // ============================================================
        class CanvasTxt {
            constructor(txt, { fontSize = 200, fontFamily = 'Arial', color = '#ffffff' } = {}) {
                this.canvas = document.createElement('canvas');
                this.context = this.canvas.getContext('2d');
                this.txt = txt;
                this.fontSize = fontSize;
                this.fontFamily = fontFamily;
                this.color = color;
                this.font = `700 ${this.fontSize}px ${this.fontFamily}`;
            }

            resize() {
                this.context.font = this.font;
                const metrics = this.context.measureText(this.txt);
                const textWidth = Math.ceil(metrics.width) + 40;
                const textHeight = Math.ceil(metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent) + 40;
                this.canvas.width = textWidth;
                this.canvas.height = textHeight;
            }

            render() {
                this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.context.fillStyle = this.color;
                this.context.font = this.font;
                const metrics = this.context.measureText(this.txt);
                const yPos = 20 + metrics.actualBoundingBoxAscent;
                this.context.shadowBlur = 20;
                this.context.shadowColor = '#ff69b4';
                this.context.fillText(this.txt, 20, yPos);
            }

            get width() { return this.canvas.width; }
            get height() { return this.canvas.height; }
            get texture() { return this.canvas; }
        }

        // ============================================================
        //  MAIN APP
        // ============================================================
        class CanvAscii {
            constructor({ text, asciiFontSize, textFontSize, textColor, planeBaseHeight, enableWaves }, containerElem,
                width, height) {
                this.textString = text;
                this.asciiFontSize = asciiFontSize;
                this.textFontSize = textFontSize;
                this.textColor = textColor;
                this.planeBaseHeight = planeBaseHeight;
                this.container = containerElem;
                this.width = width;
                this.height = height;
                this.enableWaves = enableWaves;

                this.camera = new THREE.PerspectiveCamera(45, this.width / this.height, 1, 1000);
                this.camera.position.z = 30;
                this.scene = new THREE.Scene();
                this.mouse = { x: this.width / 2, y: this.height / 2 };
                this.onMouseMove = this.onMouseMove.bind(this);
            }

            async init() {
                try {
                    await document.fonts.load('700 180px "IBM Plex Mono"');
                    await document.fonts.load('500 14px "IBM Plex Mono"');
                } catch (e) {}
                await document.fonts.ready;

                // Pink Matrix Rain
                this.matrixRain = new MatrixRain(this.container);

                this.setMesh();
                this.setRenderer();
            }

            setMesh() {
                this.textCanvas = new CanvasTxt(this.textString, {
                    fontSize: this.textFontSize,
                    fontFamily: 'IBM Plex Mono',
                    color: this.textColor
                });
                this.textCanvas.resize();
                this.textCanvas.render();

                this.texture = new THREE.CanvasTexture(this.textCanvas.texture);
                this.texture.minFilter = THREE.NearestFilter;

                const textAspect = this.textCanvas.width / this.textCanvas.height;
                const baseH = this.planeBaseHeight;
                const planeW = baseH * textAspect;
                const planeH = baseH;

                this.geometry = new THREE.PlaneGeometry(planeW, planeH, 36, 36);
                this.material = new THREE.ShaderMaterial({
                    vertexShader,
                    fragmentShader,
                    transparent: true,
                    uniforms: {
                        uTime: { value: 0 },
                        mouse: { value: 1.0 },
                        uTexture: { value: this.texture },
                        uEnableWaves: { value: this.enableWaves ? 1.0 : 0.0 }
                    }
                });

                this.mesh = new THREE.Mesh(this.geometry, this.material);
                this.scene.add(this.mesh);
            }

            setRenderer() {
                this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
                this.renderer.setPixelRatio(1);
                this.renderer.setClearColor(0x000000, 0);

                this.filter = new AsciiFilter(this.renderer, {
                    fontFamily: 'IBM Plex Mono',
                    fontSize: this.asciiFontSize,
                    invert: false
                });

                this.container.appendChild(this.filter.domElement);
                this.setSize(this.width, this.height);

                this.container.addEventListener('mousemove', this.onMouseMove);
                this.container.addEventListener('touchmove', this.onMouseMove);
            }

            setSize(w, h) {
                this.width = w;
                this.height = h;
                this.camera.aspect = w / h;
                this.camera.updateProjectionMatrix();
                this.filter.setSize(w, h);
                this.center = { x: w / 2, y: h / 2 };
            }

            load() {
                this.animate();
            }

            onMouseMove(evt) {
                const e = evt.touches ? evt.touches[0] : evt;
                const bounds = this.container.getBoundingClientRect();
                const x = e.clientX - bounds.left;
                const y = e.clientY - bounds.top;
                this.mouse = { x, y };
            }

            animate() {
                const animateFrame = () => {
                    this.animationFrameId = requestAnimationFrame(animateFrame);
                    this.render();
                };
                animateFrame();
            }

            render() {
                const time = new Date().getTime() * 0.001;
                this.textCanvas.render();
                this.texture.needsUpdate = true;
                this.mesh.material.uniforms.uTime.value = Math.sin(time);
                this.updateRotation();
                this.filter.render(this.scene, this.camera);
            }

            updateRotation() {
                const x = Math.map(this.mouse.y, 0, this.height, 0.5, -0.5);
                const y = Math.map(this.mouse.x, 0, this.width, -0.5, 0.5);
                this.mesh.rotation.x += (x - this.mesh.rotation.x) * 0.05;
                this.mesh.rotation.y += (y - this.mesh.rotation.y) * 0.05;
            }

            dispose() {
                cancelAnimationFrame(this.animationFrameId);
                if (this.filter) {
                    this.filter.dispose();
                    if (this.filter.domElement.parentNode) {
                        this.container.removeChild(this.filter.domElement);
                    }
                }
                if (this.matrixRain) {
                    this.matrixRain.dispose();
                }
                this.container.removeEventListener('mousemove', this.onMouseMove);
                this.container.removeEventListener('touchmove', this.onMouseMove);
                if (this.renderer) {
                    this.renderer.dispose();
                    this.renderer.forceContextLoss();
                }
            }
        }

        // ============================================================
        //  BOOT
        // ============================================================
        const container = document.getElementById('container');

        async function boot() {
            const { width, height } = container.getBoundingClientRect();

            const app = new CanvAscii({
                text: 'I love you Tushar',
                asciiFontSize: 14,
                textFontSize: 160,
                textColor: '#ffffff',
                planeBaseHeight: 8,
                enableWaves: true
            }, container, width, height);

            await app.init();
            app.load();

            // Handle resize
            const resizeObserver = new ResizeObserver(() => {
                const { width: w, height: h } = container.getBoundingClientRect();
                if (w > 0 && h > 0) {
                    app.setSize(w, h);
                }
            });
            resizeObserver.observe(container);

            // Expose for cleanup if needed
            window.__app = app;
            window.__resizeObserver = resizeObserver;
        }

        boot();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (window.__app) {
                window.__app.dispose();
            }
            if (window.__resizeObserver) {
                window.__resizeObserver.disconnect();
            }
        });
    </script>
</body>
</html>
