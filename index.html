<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Tushar </title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-primary: #f6aca2;
            --color-secondary: #f49b90;
            --color-tertiary: #f28b7d;
            --color-quaternary: #f07a6a;
            --color-quinary: #ee6352;
        }

        body {
            min-height: 100vh;
            font-weight: 300;
            font-size: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            display: flex;
            align-content: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .text-shadows {
            text-shadow: 3px 3px 0 var(--color-secondary), 
                         6px 6px 0 var(--color-tertiary),
                         9px 9px 0 var(--color-quaternary), 
                         12px 12px 0 var(--color-quinary);
            font-family: 'Bungee', sans-serif;
            font-weight: 400;
            text-transform: uppercase;
            font-size: calc(2rem + 5vw);
            text-align: center;
            margin: 0;
            color: var(--color-primary);
            animation: shadows 1.2s ease-in infinite;
            letter-spacing: 0.4rem;
            /* Pink glow for better visibility */
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.3));
        }

        @keyframes shadows {
            0% {
                text-shadow: none;
            }
            10% {
                transform: translate(-3px, -3px);
                text-shadow: 3px 3px 0 var(--color-secondary);
            }
            20% {
                transform: translate(-6px, -6px);
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary);
            }
            30% {
                transform: translate(-9px, -9px);
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary), 
                    9px 9px 0 var(--color-quaternary);
            }
            40% {
                transform: translate(-12px, -12px);
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary), 
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            50% {
                transform: translate(-12px, -12px);
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary), 
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            60% {
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary), 
                    9px 9px 0 var(--color-quaternary),
                    12px 12px 0 var(--color-quinary);
            }
            70% {
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary), 
                    9px 9px 0 var(--color-quaternary);
            }
            80% {
                text-shadow: 3px 3px 0 var(--color-secondary),
                    6px 6px 0 var(--color-tertiary);
            }
            90% {
                text-shadow: 3px 3px 0 var(--color-secondary);
            }
            100% {
                text-shadow: none;
            }
        }

        /* Subtitle */
        .subtitle {
            color: rgba(255, 105, 180, 0.5);
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            position: relative;
            z-index: 1;
            margin-top: 20px;
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Load Bungee font */
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="content">
        <h1 class="text-shadows">I love you Tushar</h1>
    </div>
    

    <script>
        // ============================================================
        //  MATRIX RAIN (Pink)
        // ============================================================
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let drops = [];
        const characters = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let fontSize = 14;
        let speed = 1;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cols = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let i = 0; i < cols; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const char = characters[Math.floor(Math.random() * characters.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Pink gradient for matrix rain
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, fontSize);
                const pink = Math.random();
                if (pink > 0.7) {
                    gradient.addColorStop(0, '#ff1493');
                    gradient.addColorStop(1, '#ff69b4');
                } else if (pink > 0.4) {
                    gradient.addColorStop(0, '#ff69b4');
                    gradient.addColorStop(1, '#ff8cba');
                } else {
                    gradient.addColorStop(0, '#ff8cba');
                    gradient.addColorStop(1, '#ffb6c1');
                }

                ctx.fillStyle = gradient;
                ctx.font = `${fontSize}px 'Courier New', monospace`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += speed + Math.random() * 0.5;
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        console.log(' Tushar ');
    </script>
</body>
</html>
